name: school-erp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sns,sqs,s3,ses
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot migration job — runs `alembic upgrade head` once and exits.
  # Kept separate from the app replicas so two backend instances starting
  # together never race on running migrations concurrently; both backend1
  # and backend2 wait for this to exit 0 before starting.
  migrate:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: ["alembic", "upgrade", "head"]

  # Two identical, stateless backend replicas — Phase 2's local stand-in for
  # AWS ALB + multiple ECS tasks (Phase 8). Neither holds in-memory session
  # state: auth is JWT (any replica can verify a token alone), so Nginx can
  # round-robin between them with no sticky sessions required.
  backend1:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: backend1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    volumes:
      - ../../backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend2:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: backend2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    volumes:
      - ../../backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The outbox relay: a standalone process, not part of either backend
  # replica. It polls outbox_events for PENDING rows and publishes them to
  # SNS — see ADR 0008. Running it as its own container (rather than a
  # background task inside backend1/backend2) means it has exactly one
  # writer polling the table at a time without coordinating with the web
  # process's lifecycle (reload, scaling, restarts).
  outbox-relay:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../../backend:/app
    command: ["python", "-m", "app.shared.outbox.relay"]

  # ── Phase 5: Microservices ──────────────────────────────────────────────────

  # Reporting needs its own migration (audit_log table) before it can start.
  migrate-reporting:
    build:
      context: ../../services/reporting
    env_file:
      - ../../services/reporting/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/reporting:/app
    command: ["alembic", "upgrade", "head"]

  # Notification microservice: SQS consumer → SES email.
  # No DB, no migrate step — pure event consumer.
  notification:
    build:
      context: ../../services/notification
    env_file:
      - ../../services/notification/.env.docker
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: notification
    depends_on:
      localstack:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ../../services/notification:/app

  # Reporting microservice: SQS consumer → audit_log table in its own DB.
  # Same Postgres instance as the monolith in local dev, own table = own data.
  reporting:
    build:
      context: ../../services/reporting
    env_file:
      - ../../services/reporting/.env.docker
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: reporting
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate-reporting:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    volumes:
      - ../../services/reporting:/app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend1
      - backend2
    ports:
      - "8000:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build:
      context: ../../frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - nginx
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - /app/node_modules

  # ── Phase 6: Observability ─────────────────────────────────────────────────

  # Jaeger: all-in-one collector + UI. Receives OTLP traces from every service
  # via gRPC (:4317) and HTTP (:4318). UI at :16686.
  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  # Prometheus: scrapes /metrics from both backend replicas every 15s.
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # Grafana: dashboards over Prometheus metrics. Auto-provisioned datasource
  # and a starter dashboard via the provisioning/ mount.
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Loki: log aggregation. Promtail (below) ships container logs to it.
  # Grafana uses Loki as a second datasource so you can jump from a trace to
  # its logs by time range.
  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # Promtail: reads Docker container logs and ships them to Loki, tagged with
  # container name so you can filter by service in Grafana Explore.
  promtail:
    image: grafana/promtail:3.1.0
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../observability/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  postgres_data:
  localstack_data:
  grafana_data:
