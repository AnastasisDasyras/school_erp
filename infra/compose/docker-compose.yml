name: school-erp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sns,sqs,s3
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot migration job — runs `alembic upgrade head` once and exits.
  # Kept separate from the app replicas so two backend instances starting
  # together never race on running migrations concurrently; both backend1
  # and backend2 wait for this to exit 0 before starting.
  migrate:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: ["alembic", "upgrade", "head"]

  # Two identical, stateless backend replicas — Phase 2's local stand-in for
  # AWS ALB + multiple ECS tasks (Phase 8). Neither holds in-memory session
  # state: auth is JWT (any replica can verify a token alone), so Nginx can
  # round-robin between them with no sticky sessions required.
  backend1:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../../backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend2:
    build:
      context: ../../backend
    env_file:
      - ../../backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../../backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend1
      - backend2
    ports:
      - "8000:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build:
      context: ../../frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - nginx
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  localstack_data:
