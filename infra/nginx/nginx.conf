worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Round-robin (Nginx's default load-balancing algorithm) across both
    # backend replicas — this upstream block is the local stand-in for an AWS
    # ALB target group (Phase 8): same statelessness assumptions, same
    # "any instance can serve any request" requirement.
    upstream backend_upstream {
        server backend1:8000 max_fails=3 fail_timeout=10s;
        server backend2:8000 max_fails=3 fail_timeout=10s;
    }

    log_format main '$remote_addr - [$time_local] "$request" '
                     'status=$status upstream=$upstream_addr '
                     'rt=$request_time uct="$upstream_connect_time" urt="$upstream_response_time"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    server {
        listen 80;

        location / {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Open-source Nginx has no active health checks (that's an Nginx
            # Plus feature) — passive checks via max_fails/fail_timeout above
            # are the free-tier equivalent: 3 failed proxy attempts within
            # 10s take a backend out of rotation for 10s. AWS ALB (Phase 8)
            # gets active health checks for free; this is the local trade-off.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;
        }

        # stub_status endpoint scraped by nginx-prometheus-exporter. Only
        # reachable from inside the Docker network (the container port isn't
        # published), so it's not exposed to the host.
        location = /stub_status {
            stub_status;
        }
    }
}
