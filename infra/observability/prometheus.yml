global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Both backend replicas expose /metrics on their internal port 8000.
  # Prometheus reaches them by container name (Docker DNS) — not via Nginx,
  # so each replica's metrics are tracked separately (instance label differs).
  - job_name: backend
    static_configs:
      - targets:
          - backend1:8000
          - backend2:8000

  # Postgres exporter — DB-level metrics (connections, txns, locks, cache
  # hit ratio). Reached by container name over Docker DNS, like the backend.
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  # Redis exporter — cache metrics (memory, hits/misses, evictions, clients).
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  # Nginx exporter — load-balancer metrics (connections, request rate).
  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113

  # Node exporter — host metrics (CPU, memory, disk, network).
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  # Prometheus scrapes itself so we can monitor the scrape health.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
